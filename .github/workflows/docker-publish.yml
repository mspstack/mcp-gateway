name: Publish container image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      # amd64 only for now: the App Service target is amd64 and QEMU arm64 builds
      # of the workspace npm ci are prohibitively slow; add linux/arm64 when needed.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Continuous deploy: a push to main updates the :latest tag, so poke the
      # App Service CI webhook to pull the fresh image (DOCKER_ENABLE_CI=true on
      # the app). Only on the default branch — tag builds publish :X.Y.Z but not
      # :latest, and are deployed deliberately via the release-mcp-server skill.
      - name: Trigger App Service pull (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [ -z "${{ secrets.AZURE_DEPLOY_WEBHOOK }}" ]; then
            echo "AZURE_DEPLOY_WEBHOOK not set — skipping auto-deploy"; exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.AZURE_DEPLOY_WEBHOOK }}")
          echo "webhook responded HTTP $code"
          [ "$code" -ge 200 ] && [ "$code" -lt 400 ] || { echo "webhook failed"; exit 1; }
