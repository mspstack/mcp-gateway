name: Publish container image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      # amd64 only for now: the App Service target is amd64 and QEMU arm64 builds
      # of the workspace npm ci are prohibitively slow; add linux/arm64 when needed.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Continuous deploy (best-effort): a push to main updates :latest, so poke
      # the App Service CI webhook to pull it (DOCKER_ENABLE_CI=true on the app).
      # NON-FATAL: the webhook needs SCM basic-auth publishing enabled on the app;
      # NDR org policy disables it, so this 401s and auto-deploy falls back to the
      # manual/skill path (release-mcp-server). Kept wired so it "just works" if
      # basic auth is ever enabled. Only on the default branch.
      - name: Trigger App Service pull (main only, best-effort)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.AZURE_DEPLOY_WEBHOOK }}" ]; then
            echo "AZURE_DEPLOY_WEBHOOK not set — skipping auto-deploy"; exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.AZURE_DEPLOY_WEBHOOK }}")
          echo "webhook responded HTTP $code"
          if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
            echo "auto-deploy triggered"
          else
            echo "::warning::webhook HTTP $code — auto-deploy skipped (SCM basic-auth publishing likely disabled); deploy via release-mcp-server"
          fi
