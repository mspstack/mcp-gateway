name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # npm --provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Check tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/gateway/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not set; skipping npm publish"
            exit 0
          fi
          VERSION=$(node -p "require('./packages/gateway/package.json').version")
          if npm view "@mspstack/mcp-gateway@$VERSION" version >/dev/null 2>&1; then
            echo "@mspstack/mcp-gateway@$VERSION is already published; skipping"
            exit 0
          fi
          npm publish --workspace packages/gateway --provenance --access public

      - name: Pack tarball for release asset
        run: npm pack --workspace packages/gateway

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" mspstack-mcp-gateway-*.tgz \
            --title "$GITHUB_REF_NAME" --generate-notes
